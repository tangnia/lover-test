<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>💑 家日记</title>
    <style>
        :root {
            --primary: #ff6b8b;
            --secondary: #6b8bff;
            --weekend: #ffb86b;
            --love: #ff4d8d;
            --success: #4cd964;
            --danger: #ff3b30;
            --warning: #ffcc00;
            --info: #5ac8fa;
            --calm: #8e8e93;
            
            /* 图表颜色 - 更鲜艳的版本 */
            --chart-happy: #4cd964;
            --chart-calm: #5ac8fa;
            --chart-argue: #ff3b30;
            --chart-cold: #8e8e93;
            --chart-love: #ff4d8d;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            color: #333;
        }
        
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 25px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(255, 107, 139, 0.2);
        }
        
        h1 { font-size: 32px; margin-bottom: 8px; }
        .date { font-size: 16px; opacity: 0.9; }
        
        /* 标签页 */
        .tabs {
            display: flex;
            background: white;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }
        
        /* 今日记录页面 */
        .record-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 情绪选择 */
        .mood-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .mood-btn {
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .mood-btn:hover { transform: translateY(-2px); }
        .mood-btn.active { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .mood-btn.happy { background: #e8f7eb; color: var(--success); }
        .mood-btn.happy.active { background: var(--success); color: white; }
        
        .mood-btn.calm { background: #e8f4ff; color: var(--info); }
        .mood-btn.calm.active { background: var(--info); color: white; }
        
        .mood-btn.argue { background: #ffe8e8; color: var(--danger); }
        .mood-btn.argue.active { background: var(--danger); color: white; }
        
        .mood-btn.cold { background: #f0f0f0; color: var(--calm); }
        .mood-btn.cold.active { background: var(--calm); color: white; }
        
        /* 亲密选择 */
        .love-section {
            margin-bottom: 25px;
        }
        
        .love-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .love-toggle:hover { background: #f0f2ff; }
        .love-toggle.active { background: #ffe8f0; }
        
        .love-label {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .love-checkbox {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .love-toggle.active .love-checkbox {
            background: var(--love);
            border-color: var(--love);
        }
        
        .love-toggle.active .love-checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        
        /* 时间记录 */
        .time-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .time-input {
            padding: 15px;
            background: #f8f9ff;
            border-radius: 15px;
        }
        
        .time-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }
        
        .time-field {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0ff;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            box-sizing: border-box;
        }
        
        .time-field:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        /* 时间网格和按钮 - 恢复原始样式 */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .time-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .time-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .time-value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }
        
        .time-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .time-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 139, 0.3);
        }
        
        .time-btn.recorded {
            background: linear-gradient(135deg, var(--success) 0%, #34c759 100%);
        }
        
        /* 散步和运动按钮特殊样式 */
        .time-btn.walk-btn {
            background: linear-gradient(135deg, #34c759 0%, #2ecc71 100%);
        }
        
        .time-btn.exercise-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }
        
        .time-btn.walk-btn.active {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        
        .time-btn.exercise-btn.active {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        
        /* 时长显示 */
        .duration-display {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            min-height: 20px;
        }
        
        /* 日记输入 */
        .diary-input {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 2px solid #e0e0ff;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        
        .diary-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .voice-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        
        .voice-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 107, 139, 0.3); }
        .voice-btn.recording { background: var(--danger); animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }
        
        /* 保存按钮 */
        .save-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 107, 139, 0.3); }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 历史记录页面 */
        .history-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        .history-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .history-item {
            margin-bottom: 12px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            border-left: 4px solid var(--success);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .history-item:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        /* 统计页面 */
        .stats-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        .chart-container {
            margin-top: 20px;
            position: relative;
            height: 300px;
        }
        
        .year-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .year-btn {
            padding: 10px 20px;
            background: #f8f9ff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .year-btn:hover { background: #e0e2ff; }
        
        /* 认证界面 */
        .auth-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .auth-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }
        
        .auth-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0ff;
            border-radius: 15px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        
        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }
        
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 107, 139, 0.3); }
        
        .auth-switch {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            display: inline-block;
        }
        
        .auth-switch:hover { text-decoration: underline; }
        
        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 300px;
        }
        
        .notification.show { transform: translateX(0); }
        
        .notification.success { border-left: 4px solid var(--success); }
        .notification.error { border-left: 4px solid var(--danger); }
        .notification.info { border-left: 4px solid var(--info); }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            body { padding: 15px; }
            .header { padding: 20px; }
            .record-section, .history-section, .stats-section, .auth-section { padding: 20px; }
            .mood-buttons { grid-template-columns: 1fr; }
            .time-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 认证界面 -->
        <div id="authSection" class="auth-section" style="display: none;">
            <div class="auth-title" id="authTitle">登录家日记</div>
            <input type="email" id="authEmail" class="auth-input" placeholder="邮箱地址">
            <input type="password" id="authPassword" class="auth-input" placeholder="密码">
            <button id="authButton" class="auth-btn">登录</button>
            <div id="authSwitch" class="auth-switch">还没有账户？注册</div>
        </div>
        
        <!-- 主应用界面 -->
        <div id="appSection" style="display: none;">
            <!-- 头部 -->
            <div class="header">
                <h1>💑 家日记</h1>
                <div class="date" id="currentDate">2026年4月10日 星期五</div>
            </div>
            
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('record')">📝 今日记录</button>
                <button class="tab" onclick="switchTab('history')">📚 历史记录</button>
                <button class="tab" onclick="switchTab('stats')">📊 统计</button>
            </div>
            
            <!-- 今日记录页面 -->
            <div id="recordTab" class="tab-content">
                <div class="record-section">
                    <div class="section-title">😊 今日情绪</div>
                    <div class="mood-buttons">
                        <button class="mood-btn happy" onclick="selectMood('happy')">
                            <span style="font-size: 24px;">😊</span>
                            <span>开心</span>
                        </button>
                        <button class="mood-btn calm" onclick="selectMood('calm')">
                            <span style="font-size: 24px;">😌</span>
                            <span>平静</span>
                        </button>
                        <button class="mood-btn argue" onclick="selectMood('argue')">
                            <span style="font-size: 24px;">😠</span>
                            <span>争吵</span>
                        </button>
                        <button class="mood-btn cold" onclick="selectMood('cold')">
                            <span style="font-size: 24px;">🥶</span>
                            <span>冷战</span>
                        </button>
                    </div>
                </div>
                
                <div class="record-section">
                    <div class="section-title">❤️ 亲密时刻</div>
                    <div class="love-section">
                        <div class="love-toggle" id="loveToggle" onclick="toggleLove()">
                            <div class="love-label">
                                <span style="font-size: 24px;">💙</span>
                                <span>今日是否有亲密时刻？</span>
                            </div>
                            <div class="love-checkbox"></div>
                        </div>
                    </div>
                </div>
                
                <div class="record-section">
                    <div class="section-title">⏰ 时间记录</div>
                    <div class="time-grid">
                        <div class="time-card">
                            <div class="time-label">
                                <span>🛁</span> 洗澡时间
                            </div>
                            <div class="time-value" id="bathTimeDisplay">未记录</div>
                            <input type="time" class="time-field" id="bathTime" style="display: none;">
                            <button class="time-btn" onclick="recordBathTime()">
                                ⏰ 记录当前时间
                            </button>
                        </div>
                        
                        <div class="time-card">
                            <div class="time-label">
                                <span>🛏️</span> 上床时间
                            </div>
                            <div class="time-value" id="bedTimeDisplay">未记录</div>
                            <input type="time" class="time-field" id="bedTime" style="display: none;">
                            <button class="time-btn" onclick="recordBedTime()">
                                ⏰ 记录当前时间
                            </button>
                        </div>
                        
                        <div class="time-card">
                            <div class="time-label">
                                <span>🚶</span> 散步记录
                            </div>
                            <div class="time-value" id="walkStatusDisplay">未开始</div>
                            <div class="duration-display" id="walkDurationDisplay"></div>
                            <button class="time-btn walk-btn" id="walkButton" onclick="toggleWalk()">
                                🚶 开始散步
                            </button>
                        </div>
                        
                        <div class="time-card">
                            <div class="time-label">
                                <span>💪</span> 运动记录
                            </div>
                            <div class="time-value" id="exerciseStatusDisplay">未开始</div>
                            <div class="duration-display" id="exerciseDurationDisplay"></div>
                            <button class="time-btn exercise-btn" id="exerciseButton" onclick="toggleExercise()">
                                💪 开始运动
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="record-section">
                    <div class="section-title">📝 日记与评论</div>
                    <textarea class="diary-input" id="diaryInput" placeholder="写下今天的日记..."></textarea>
                    <textarea class="diary-input" id="commentInput" placeholder="添加评论或备注..."></textarea>
                    <button class="voice-btn" id="voiceButton" onclick="toggleVoice()">
                        <span>🎤</span>
                        <span>语音输入</span>
                    </button>
                </div>
                
                <!-- 自动保存状态 -->
                <div id="autoSaveStatus" style="margin-top: 25px; padding: 15px; text-align: center; font-size: 14px; color: #666; background: linear-gradient(135deg, rgba(255, 107, 139, 0.05) 0%, rgba(107, 139, 255, 0.05) 100%); border-radius: 15px; border: 1px solid rgba(255, 107, 139, 0.1);">
                    💾 所有更改已自动保存
                </div>
            </div>
            
            <!-- 历史记录页面 -->
            <div id="historyTab" class="tab-content" style="display: none;">
                <div class="history-section">
                    <div class="section-title">📚 历史记录</div>
                    <div class="history-list" id="historyList">
                        <!-- 历史记录将在这里动态加载 -->
                    </div>
                </div>
            </div>
            
            <!-- 统计页面 -->
            <div id="statsTab" class="tab-content" style="display: none;">
                <div class="stats-section">
                    <div class="section-title">📊 月度统计</div>
                    <div class="chart-container">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
                
                <div class="stats-section">
                    <div class="section-title">📈 年度统计</div>
                    <div class="year-nav">
                        <button class="year-btn" onclick="changeYear(-1)">← 上一年</button>
                        <span id="currentYear" style="font-weight: 600; font-size: 18px;">2026</span>
                        <button class="year-btn" onclick="changeYear(1)">下一年 →</button>
                    </div>
                    <div class="chart-container">
                        <canvas id="yearlyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 通知 -->
    <div id="notification" class="notification"></div>
    
    <!-- 外部库 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <script>
        // ==================== Supabase 配置 ====================
        // 已配置用户提供的 Supabase 项目
        const SUPABASE_URL = 'https://yjhruryippuddqatkibt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_990BHVgXkZGTxQgOiWURAA_5ab6EZmT';
        
        // 初始化 Supabase 客户端
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ==================== 应用状态 ====================
        let currentUser = null;
        let currentMood = null;
        let currentLove = false;
        let currentYear = new Date().getFullYear();
        let monthlyChart = null;
        let yearlyChart = null;
        let recognition = null;
        let isRecording = false;
        let saveTimer = null;
        
        // 散步和运动状态
        let walkStartTime = null;
        let walkTimer = null;
        let walkDuration = 0;
        let exerciseStartTime = null;
        let exerciseTimer = null;
        let exerciseDuration = 0;
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', async function() {
            updateDate();
            
            // 检查用户登录状态
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session) {
                currentUser = session.user;
                showApp();
                loadTodayRecord();
                loadHistory();
                loadStats();
            } else {
                showAuth();
            }
            
            // 监听认证状态变化
            supabase.auth.onAuthStateChange((event, session) => {
                if (session) {
                    currentUser = session.user;
                    showApp();
                    loadTodayRecord();
                    loadHistory();
                    loadStats();
                } else {
                    currentUser = null;
                    showAuth();
                }
            });
            
            // 初始化语音识别
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'zh-CN';
                
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('diaryInput').value += transcript;
                    showNotification('语音输入完成', 'success');
                };
                
                recognition.onerror = function(event) {
                    showNotification('语音识别错误: ' + event.error, 'error');
                };
                
                recognition.onend = function() {
                    isRecording = false;
                    document.getElementById('voiceButton').classList.remove('recording');
                    document.getElementById('voiceButton').innerHTML = '<span>🎤</span><span>语音输入</span>';
                };
            }
            
            // 为输入框添加自动保存监听
            document.getElementById('diaryInput').addEventListener('input', autoSave);
            document.getElementById('commentInput').addEventListener('input', autoSave);
        });

        async function handleLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            
            if (!email || !password) {
                showNotification('请输入邮箱和密码', 'error');
                return;
            }
            
            const button = document.getElementById('authButton');
            const originalText = button.textContent;
            button.textContent = '处理中...';
            button.disabled = true;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) {
                    // 如果登录失败，尝试注册
                    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
                        email,
                        password
                    });
                    
                    if (signUpError) {
                        showNotification('注册失败: ' + signUpError.message, 'error');

            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        }

        // 散步功能
        function toggleWalk() {
            if (!walkStartTime) {

                const minutes = walkStartTime.getMinutes().toString().padStart(2, '0');

                // 结束散步
                const endTime = new Date();
                const hours = endTime.getHours().toString().padStart(2, '0');
                const minutes = endTime.getMinutes().toString().padStart(2, '0');
                const endTimeStr = `${hours}:${minutes}`;
                
                // 计算时长（分钟）
                const durationMs = endTime - walkStartTime;
                walkDuration = Math.floor(durationMs / 60000);
                
                // 更新显示
                document.getElementById('walkStatusDisplay').textContent = `结束: ${endTimeStr}`;
                document.getElementById('walkDurationDisplay').textContent = `时长: ${walkDuration} 分钟`;

                    walkTimer = null;

                showNotification(`🚶 散步结束，时长: ${walkDuration} 分钟`, 'success');

                autoSave();
            }
        }

            // 显示保存状态
            const statusEl = document.getElementById('autoSaveStatus');
            statusEl.textContent = '正在保存...';
            statusEl.style.color = '#ffcc00';
            
            // 设置新的定时器（1秒后保存）

        async function saveRecord() {
            // 如果没有选择情绪，不保存（但允许保存时间记录）
            if (!currentMood) {
                return;
            }
            
            const today = new Date().toISOString().split('T')[0];
            const bathTime = document.getElementById('bathTime').value;
            const bedTime = document.getElementById('bedTime').value;
            const diary = document.getElementById('diaryInput').value.trim();
            const comment = document.getElementById('commentInput').value.trim();
            
            const record = {
                date: today,
                mood: currentMood,
                love: currentLove,
                bath_time: bathTime || null,
                bed_time: bedTime || null,
                walk_start_time: walkStartTime ? 
                    `${walkStartTime.getHours().toString().padStart(2, '0')}:${walkStartTime.getMinutes().toString().padStart(2, '0')}` : null,
                walk_end_time: walkStartTime && !walkTimer ? 
                    `${new Date().getHours().toString().padStart(2, '0')}:${new Date().getMinutes().toString().padStart(2, '0')}` : null,
                walk_duration_minutes: walkDuration || null,
                exercise_start_time: exerciseStartTime ? 
                    `${exerciseStartTime.getHours().toString().padStart(2, '0')}:${exerciseStartTime.getMinutes().toString().padStart(2, '0')}` : null,
                exercise_end_time: exerciseStartTime && !exerciseTimer ? 
                    `${new Date().getHours().toString().padStart(2, '0')}:${new Date().getMinutes().toString().padStart(2, '0')}` : null,
                exercise_duration_minutes: exerciseDuration || null,
                diary: diary || null,
                comment: comment || null
            };
            
            // 更新保存状态
            const statusEl = document.getElementById('autoSaveStatus');
            statusEl.textContent = '正在保存...';
            statusEl.style.color = '#ffcc00';
            
            try {
                // 检查是否已存在今日记录
                const { data: existing } = await supabase
                    .from('diary_records')
                    .select('id')
                    .eq('date', today)
                    .single();
                
                let result;
                if (existing) {
                    // 更新现有记录
                    result = await supabase
                        .from('diary_records')
                        .update(record)
                        .eq('id', existing.id);
                } else {
                    // 插入新记录
                    result = await supabase
                        .from('diary_records')
                        .insert([record]);
                }
                
                if (result.error) {
                    showNotification('保存失败: ' + result.error.message, 'error');
                    statusEl.textContent = '保存失败';
                    statusEl.style.color = '#ff3b30';
                    
                    // 3秒后恢复
                    setTimeout(() => {
                        statusEl.textContent = '所有更改已自动保存';
                        statusEl.style.color = '#666';
                    }, 3000);
                } else {
                    // 不显示成功通知，只更新状态
                    statusEl.textContent = '已自动保存';
                    statusEl.style.color = '#4cd964';
                    
                    // 刷新历史记录和统计
                    loadHistory();
                    loadStats();
                    
                    // 3秒后恢复原样
                    setTimeout(() => {
                        statusEl.textContent = '所有更改已自动保存';
                        statusEl.style.color = '#666';
                    }, 2000);
                }
            } catch (error) {
                showNotification('保存失败: ' + error.message, 'error');
                statusEl.textContent = '保存失败';
                statusEl.style.color = '#ff3b30';
                
                // 3秒后恢复
                setTimeout(() => {
                    statusEl.textContent = '所有更改已自动保存';
                    statusEl.style.color = '#666';
                }, 3000);
            }
        }

        async function loadHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = '<div style="text-align: center; padding: 20px;"><div class="loading"></div> 加载中...</div>';
            
            try {
                const { data, error } = await supabase
                    .from('diary_records')
                    .select('*')
                    .order('date', { ascending: false })
                    .limit(50);
                
                if (error) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">加载失败</div>';
                    return;
                }
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">暂无记录</div>';
                    return;
                }
                
                let html = '';
                data.forEach(record => {
                    const date = new Date(record.date);
                    const dateStr = date.toLocaleDateString('zh-CN', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    
                    const moodEmoji = {
                        'happy': '😊',
                        'calm': '😌',
                        'argue': '😠',
                        'cold': '🥶'
                    }[record.mood] || '📝';
                    
                    const moodColor = {
                        'happy': '#4cd964',
                        'calm': '#5ac8fa',
                        'argue': '#ff3b30',
                        'cold': '#8e8e93'
                    }[record.mood] || '#666';
                    
                    const loveEmoji = record.love ? '❤️' : '💙';
                    
                    html += `
                        <div class="history-item" onclick="viewRecord('${record.id}')" style="
                            margin-bottom: 12px;
                            padding: 15px;
                            background: white;
                            border-radius: 12px;
                            border-left: 4px solid ${moodColor};
                            cursor: pointer;
                        ">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div style="font-weight: 700; color: #333;">${dateStr}</div>
                                <div style="display: flex; gap: 8px; font-size: 20px;">
                                    <span>${moodEmoji}</span>
                                    <span>${loveEmoji}</span>
                                </div>
                            </div>
                            ${record.diary ? `
                                <div style="margin-top: 10px; color: #666; font-size: 14px; line-height: 1.5;">
                                    ${record.diary.substring(0, 60)}${record.diary.length > 60 ? '...' : ''}
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">加载失败</div>';
                console.error('加载历史记录时出错:', error);
            }
        }
        
        async function viewRecord(recordId) {
            try {
                const { data, error } = await supabase
                    .from('diary_records')
                    .select('*')
                    .eq('id', recordId)
                    .single();
                
                if (error) {
                    showNotification('加载记录失败', 'error');
                    return;
                }
                
                const date = new Date(data.date);
                const dateStr = date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'long'
                });
                
                const moodText = {
                    'happy': '😊 开心',
                    'calm': '😌 平静',
                    'argue': '😠 争吵',
                    'cold': '🥶 冷战'
                }[data.mood] || '未知';
                
                const loveText = data.love ? '❤️ 有亲密' : '💙 无亲密';
                
                let details = `
                    <div style="margin-bottom: 20px;">
                        <div style="font-size: 16px; font-weight: 600; margin-bottom: 10px;">📊 记录详情</div>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                            <div style="padding: 12px; background: #f8f9fa; border-radius: 10px;">
                                <div style="font-size: 12px; color: #666;">情绪</div>
                                <div style="font-size: 16px; font-weight: 600;">${moodText}</div>
                            </div>
                            <div style="padding: 12px; background: #f8f9fa; border-radius: 10px;">
                                <div style="font-size: 12px; color: #666;">亲密</div>
                                <div style="font-size: 16px; font-weight: 600;">${loveText}</div>
                            </div>
                        </div>
                    </div>
                `;
                
                if (data.bath_time || data.bed_time) {
                    details += `
                        <div style="margin-bottom: 20px;">
                            <div style="font-size: 16px; font-weight: 600; margin-bottom: 10px;">⏰ 时间记录</div>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                                ${data.bath_time ? `
                                    <div style="padding: 12px; background: #f8f9fa; border-radius: 10px;">
                                        <div style="font-size: 12px; color: #666;">洗澡时间</div>
                                        <div style="font-size: 16px; font-weight: 600;">${data.bath_time}</div>
                                    </div>
                                ` : ''}
                                ${data.bed_time ? `
                                    <div style="padding: 12px; background: #f8f9fa; border-radius: 10px;">
                                        <div style="font-size: 12px; color: #666;">上床时间</div>
                                        <div style="font-size: 16px; font-weight: 600;">${data.bed_time}</div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }
                
                if (data.diary) {
                    details += `
                        <div style="margin-bottom: 20px;">
                            <div style="font-size: 16px; font-weight: 600; margin-bottom: 10px;">📝 日记</div>
                            <div style="padding: 15px; background: #f8f9fa; border-radius: 10px; line-height: 1.6;">
                                ${data.diary.replace(/\n/g, '<br>')}
                            </div>
                        </div>
                    `;
                }
                
                if (data.comment) {
                    details += `
                        <div style="margin-bottom: 20px;">
                            <div style="font-size: 16px; font-weight: 600; margin-bottom: 10px;">💬 评论</div>
                            <div style="padding: 15px; background: #f8f9fa; border-radius: 10px; line-height: 1.6; color: #666;">
                                ${data.comment.replace(/\n/g, '<br>')}
                            </div>
                        </div>
                    `;
                }
                
                // 显示详情弹窗
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0,0,0,0.5);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 1000;
                    padding: 20px;
                `;
                
                const content = document.createElement('div');
                content.style.cssText = `
                    background: white;
                    border-radius: 20px;
                    padding: 25px;
                    max-width: 500px;
                    width: 100%;
                    max-height: 80vh;
                    overflow-y: auto;
                `;
                
                content.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <div style="font-size: 20px; font-weight: 700;">${dateStr}</div>
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" style="
                            background: none;
                            border: none;
                            font-size: 24px;
                            cursor: pointer;
                            color: #666;
                        ">×</button>
                    </div>
                    ${details}
                `;
                
                modal.appendChild(content);
                document.body.appendChild(modal);
                
                // 点击背景关闭
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        modal.remove();
                    }
                });
                
            } catch (error) {
                showNotification('查看记录失败', 'error');
                console.error('查看记录时出错:', error);
            }
        }
        
        async function loadStats() {
            await loadMonthlyStats();
            await loadYearlyStats();
        }
        
        async function loadMonthlyStats() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            
            try {
                const { data, error } = await supabase
                    .from('diary_records')
                    .select('*')
                    .gte('date', `${year}-${month.toString().padStart(2, '0')}-01`)
                    .lt('date', `${year}-${(month + 1).toString().padStart(2, '0')}-01`)
                    .order('date', { ascending: true });
                
                if (error) {
                    console.error('加载月度统计失败:', error);
                    return;
                }
                
                // 准备数据
                const daysInMonth = new Date(year, month, 0).getDate();
                const dates = [];
                const happyData = [];
                const calmData = [];
                const argueData = [];
                const coldData = [];
                const loveData = [];
                const walkData = [];
                const exerciseData = [];
                
                // 初始化所有天数为0
                for (let day = 1; day <= daysInMonth; day++) {
                    dates.push(`${month}月${day}日`);
                    happyData.push(0);
                    calmData.push(0);
                    argueData.push(0);
                    coldData.push(0);
                    loveData.push(0);
                    walkData.push(0);
                    exerciseData.push(0);
                }
                
                // 填充实际数据
                if (data) {
                    data.forEach(record => {
                        const day = new Date(record.date).getDate() - 1;
                        if (day >= 0 && day < daysInMonth) {
                            if (record.mood === 'happy') happyData[day] = 1;
                            if (record.mood === 'calm') calmData[day] = 1;
                            if (record.mood === 'argue') argueData[day] = 1;
                            if (record.mood === 'cold') coldData[day] = 1;
                            if (record.love) loveData[day] = 1;
                            if (record.walk_duration_minutes && record.walk_duration_minutes > 0) walkData[day] = 1;
                            if (record.exercise_duration_minutes && record.exercise_duration_minutes > 0) exerciseData[day] = 1;
                        }
                    });
                }
                
                // 创建或更新图表
                const ctx = document.getElementById('monthlyChart').getContext('2d');
                
                if (monthlyChart) {
                    monthlyChart.destroy();
                }
                
                monthlyChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [
                            {
                                label: '开心',
                                data: happyData,
                                borderColor: '#4cd964',
                                backgroundColor: 'rgba(76, 217, 100, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 3
                            },
                            {
                                label: '平静',
                                data: calmData,
                                borderColor: '#5ac8fa',
                                backgroundColor: 'rgba(90, 200, 250, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 3
                            },
                            {
                                label: '争吵',
                                data: argueData,
                                borderColor: '#ff3b30',
                                backgroundColor: 'rgba(255, 59, 48, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 3
                            },
                            {
                                label: '冷战',
                                data: coldData,
                                borderColor: '#8e8e93',
                                backgroundColor: 'rgba(142, 142, 147, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 3
                            },
                            {
                                label: '爱爱',
                                data: loveData,
                                borderColor: '#ff4d8d',
                                backgroundColor: 'rgba(255, 77, 141, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 3
                            },
                            {
                                label: '散步',
                                data: walkData,
                                borderColor: '#34c759',
                                backgroundColor: 'rgba(52, 199, 89, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 3
                            },
                            {
                                label: '运动',
                                data: exerciseData,
                                borderColor: '#3498db',
                                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    padding: 20,
                                    usePointStyle: true
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            },
                            y: {
                                beginAtZero: true,
                                max: 1,
                                ticks: {
                                    stepSize: 1,
                                    callback: function(value) {
                                        return value === 1 ? '有' : '无';
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('创建月度图表时出错:', error);
            }
        }
        
        async function loadYearlyStats() {
            document.getElementById('currentYear').textContent = currentYear;
            
            try {
                const { data, error } = await supabase
                    .from('diary_records')
                    .select('*')
                    .gte('date', `${currentYear}-01-01`)
                    .lt('date', `${currentYear + 1}-01-01`);
                
                if (error) {
                    console.error('加载年度统计失败:', error);
                    return;
                }
                
                // 准备数据
                const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                const happyData = new Array(12).fill(0);
                const calmData = new Array(12).fill(0);
                const argueData = new Array(12).fill(0);
                const coldData = new Array(12).fill(0);
                const loveData = new Array(12).fill(0);
                const walkData = new Array(12).fill(0);
                const exerciseData = new Array(12).fill(0);
                
                // 统计每月数据
                if (data) {
                    data.forEach(record => {
                        const month = new Date(record.date).getMonth();
                        if (record.mood === 'happy') happyData[month]++;
                        if (record.mood === 'calm') calmData[month]++;
                        if (record.mood === 'argue') argueData[month]++;
                        if (record.mood === 'cold') coldData[month]++;
                        if (record.love) loveData[month]++;
                        if (record.walk_duration_minutes && record.walk_duration_minutes > 0) walkData[month]++;
                        if (record.exercise_duration_minutes && record.exercise_duration_minutes > 0) exerciseData[month]++;
                    });
                }
                
                // 创建或更新图表
                const ctx = document.getElementById('yearlyChart').getContext('2d');
                
                if (yearlyChart) {
                    yearlyChart.destroy();
                }
                
                yearlyChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: months,
                        datasets: [
                            {
                                label: '开心',
                                data: happyData,
                                backgroundColor: '#4cd964',
                                borderColor: '#4cd964',
                                borderWidth: 1
                            },
                            {
                                label: '平静',
                                data: calmData,
                                backgroundColor: '#5ac8fa',
                                borderColor: '#5ac8fa',
                                borderWidth: 1
                            },
                            {
                                label: '争吵',
                                data: argueData,
                                backgroundColor: '#ff3b30',
                                borderColor: '#ff3b30',
                                borderWidth: 1
                            },
                            {
                                label: '冷战',
                                data: coldData,
                                backgroundColor: '#8e8e93',
                                borderColor: '#8e8e93',
                                borderWidth: 1
                            },
                            {
                                label: '爱爱',
                                data: loveData,
                                backgroundColor: '#ff4d8d',
                                borderColor: '#ff4d8d',
                                borderWidth: 1
                            },
                            {
                                label: '散步',
                                data: walkData,
                                backgroundColor: '#34c759',
                                borderColor: '#34c759',
                                borderWidth: 1
                            },
                            {
                                label: '运动',
                                data: exerciseData,
                                backgroundColor: '#3498db',
                                borderColor: '#3498db',
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    padding: 20,
                                    usePointStyle: true
                                }
                            }
                        },
                        scales: {
                            x: {
                                stacked: false,
                                grid: {
                                    display: false
                                }
                            },
                            y: {
                                stacked: false,
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('创建年度图表时出错:', error);
            }
        }
        
        function changeYear(delta) {
            currentYear += delta;
            loadYearlyStats();
        }
        
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification';
            notification.classList.add(type);
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // 退出登录
        async function logout() {
            await supabase.auth.signOut();
            showNotification('已退出登录', 'info');
        }
        
        // 添加退出按钮到头部
        function addLogoutButton() {
            const header = document.querySelector('.header');
            const logoutBtn = document.createElement('button');
            logoutBtn.textContent = '退出';
            logoutBtn.style.cssText = `
                position: absolute;
                top: 20px;
                right: 20px;
                background: rgba(255,255,255,0.2);
                border: none;
                color: white;
                padding: 8px 16px;
                border-radius: 10px;
                font-size: 14px;
                cursor: pointer;
                transition: all 0.3s ease;
            `;
            logoutBtn.onmouseover = function() {
                this.style.background = 'rgba(255,255,255,0.3)';
            };
            logoutBtn.onmouseout = function() {
                this.style.background = 'rgba(255,255,255,0.2)';
            };
            logoutBtn.onclick = logout;
            
            header.style.position = 'relative';
            header.appendChild(logoutBtn);
        }
        
        // 初始化完成后添加退出按钮
        setTimeout(addLogoutButton, 1000);
    </script>
</body>
</html>
